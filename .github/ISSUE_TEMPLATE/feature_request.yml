name: Feature request
description: Suggest an idea or improvement for Playro
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app (Electron UI)
        - Roblox generation (Luau / Rojo output)
        - Hermes backend / API
        - Docs
        - Other
    validations:
      required: true
