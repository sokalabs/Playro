name: Playro Server Verify

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "product/roblox_ai_studio/**"
      - "scripts/verify-playro-desktop-server.sh"
      - ".github/workflows/playro-server-verify.yml"

permissions:
  contents: read

concurrency:
  group: playro-server-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Server-side desktop build/verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYRO_USE_HERMES_AGENT: "0"
      PLAYRO_RUNTIME_SMOKE_ALLOW_BROWSER_SKIP: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: product/roblox_ai_studio/desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Chromium for runtime smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Run Playro server verification workflow
        run: scripts/verify-playro-desktop-server.sh

      - name: Upload verification artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        continue-on-error: true
        with:
          name: playro-server-verify-artifacts
          path: |
            product/roblox_ai_studio/artifacts/server-build-verify/
            product/roblox_ai_studio/artifacts/desktop-smoke/
          retention-days: 3
